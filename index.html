<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story Creator - FtMonopol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        @font-face {
            font-family: 'FtMonopol';
            src: url('FtMonopol-Bold.woff2') format('woff2');
            font-weight: bold;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            font-family: 'FtMonopol', sans-serif;
        }

        body {
            background-color: #0e0e0e;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .toolbar {
            background: #1a1a1a;
            width: 100%;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            z-index: 10;
            border-bottom: 1px solid #333;
        }

        button, .file-label {
            background: #262626;
            color: white;
            border: 1px solid #444;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background: #333; }
        .btn-add { background: #007bff; border: none; }
        .btn-save { background: #28a745; border: none; }
        .btn-delete { background: #c0392b; border: none; }

        #editor-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .canvas-container {
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn-add" onclick="addText()">➕ טקסט</button>
        <label class="file-label">
            🖼️ הוסף תמונה
            <input type="file" id="imageLoader" accept="image/*">
        </label>
        <button onclick="changeBgColor()">🎨 צבע רקע</button>
        <button class="btn-delete" onclick="deleteObject()">🗑️ מחק פריט</button>
        <button class="btn-save" onclick="downloadImage()">💾 שמור PNG</button>
        <button class="btn-save" style="background:#25d366" onclick="shareImage()">📱 שתף</button>
    </div>

    <div id="editor-wrapper">
        <canvas id="storyCanvas"></canvas>
    </div>

    <script>
        // אתחול קנבס ברזולוציית סטורי (1080x1920)
        const canvas = new fabric.Canvas('storyCanvas', {
            width: 1080,
            height: 1920,
            backgroundColor: '#001f3f',
            preserveObjectStacking: true // שומר על סדר השכבות
        });

        // רספונסיביות למחשב ולמובייל
        function resizeCanvas() {
            const wrapper = document.getElementById('editor-wrapper');
            const scale = Math.min(
                (wrapper.clientWidth - 20) / 1080,
                (wrapper.clientHeight - 20) / 1920
            );
            canvas.setZoom(scale);
            canvas.setWidth(1080 * scale);
            canvas.setHeight(1920 * scale);
        }

        // טעינת הלוגו באופן קבוע
        function loadLogo() {
            fabric.Image.fromURL('logo.png', function(img) {
                const logoWidth = 350; // ניתן לשנות את הגודל כאן
                img.set({
                    left: 540,
                    top: 180,
                    originX: 'center',
                    originY: 'center',
                    selectable: false, // המשתמש לא יכול להזיז אותו
                    evented: false,   // המשתמש לא יכול לבחור אותו
                    opacity: 1
                });
                img.scaleToWidth(logoWidth);
                canvas.add(img);
                canvas.sendToBack(img); // מבטיח שהלוגו לא יסתיר תפריטים אם יש כאלו
                canvas.renderAll();
            }, { crossOrigin: 'anonymous' });
        }

        // הפעלה ראשונית
        window.addEventListener('resize', resizeCanvas);
        document.fonts.ready.then(() => {
            resizeCanvas();
            loadLogo(); // טעינת הלוגו מיד עם העלייה
        });

        // הוספת טקסט בפונט המבוקש
        function addText() {
            const text = new fabric.IText('הקלד כאן...', {
                left: 540,
                top: 960,
                fontFamily: 'FtMonopol',
                fill: '#ffffff',
                fontSize: 90,
                textAlign: 'center',
                originX: 'center',
                originY: 'center',
                direction: 'rtl'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        // הוספת תמונה מהמכשיר
        document.getElementById('imageLoader').onchange = function (e) {
            const reader = new FileReader();
            reader.onload = function (f) {
                const data = f.target.result;
                fabric.Image.fromURL(data, function (img) {
                    img.scaleToWidth(600);
                    img.set({ left: 540, top: 1100, originX: 'center', originY: 'center' });
                    canvas.add(img);
                    // מוודא שהלוגו תמיד נשאר למעלה מבחינת סדר שכבות אם צריך
                    canvas.renderAll();
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // שינוי צבע רקע
        const bgColors = ['#001f3f', '#000000', '#1c1c1c', '#ffffff', '#ff4136'];
        let currentBgIdx = 0;
        function changeBgColor() {
            currentBgIdx = (currentBgIdx + 1) % bgColors.length;
            canvas.setBackgroundColor(bgColors[currentBgIdx], canvas.renderAll.bind(canvas));
        }

        function deleteObject() {
            const active = canvas.getActiveObject();
            if (active) canvas.remove(active);
        }

        function prepareExport() {
            canvas.setZoom(1);
            canvas.setWidth(1080);
            canvas.setHeight(1920);
        }

        function downloadImage() {
            prepareExport();
            const link = document.createElement('a');
            link.download = 'ft-monopol-story.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1 });
            link.click();
            resizeCanvas();
        }

        async function shareImage() {
            prepareExport();
            canvas.getElement().toBlob(async (blob) => {
                const file = new File([blob], 'story.png', { type: 'image/png' });
                if (navigator.share) {
                    try { await navigator.share({ files: [file] }); } catch (e) {}
                } else { alert("הדפדפן לא תומך בשיתוף."); }
                resizeCanvas();
            });
        }
    </script>
</body>
</html>
