<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FtMonopol Story Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        /* טעינת הפונט המקורי */
        @font-face {
            font-family: 'FtMonopol';
            src: url('FtMonopol-Bold.woff2') format('woff2');
            font-weight: bold;
        }

        :root { --vh: 1vh; }

        * { 
            box-sizing: border-box; 
            font-family: 'FtMonopol', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #000;
            color: white;
            margin: 0;
            display: flex;
            height: calc(var(--vh) * 100);
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        /* תפריט צד אנכי */
        .side-menu {
            width: 80px;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) 5px env(safe-area-inset-bottom) 5px;
            gap: 8px;
            border-left: 1px solid #333;
            z-index: 100;
        }

        .menu-item {
            background: #1e1e1e;
            border: 1px solid #444;
            color: white;
            width: 100%;
            height: 60px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-item:active { background: #333; transform: scale(0.9); }
        .menu-item b { font-size: 20px; font-style: normal; }
        .menu-item span { font-size: 10px; margin-top: 2px; font-weight: bold; }

        /* בורר צבעים */
        .color-picker-btn {
            position: relative;
            width: 30px; height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            background: linear-gradient(45deg, red, blue, green);
            overflow: hidden;
        }
        #colorInput {
            position: absolute; top: -5px; left: -5px; width: 50px; height: 50px; opacity: 0; cursor: pointer;
        }

        /* אזור העריכה */
        .main-editor {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            position: relative;
            padding: 10px;
        }

        #canvas-wrapper { box-shadow: 0 0 30px rgba(0,0,0,0.8); }

        /* מגירת אייקונים */
        .icon-drawer {
            position: absolute; bottom: -350px; left: 0; width: 100%; height: 300px;
            background: #1a1a1a; border-top: 2px solid #333; transition: 0.4s ease;
            display: grid; grid-template-columns: repeat(4, 1fr); overflow-y: auto; padding: 20px; gap: 15px; z-index: 150;
        }
        .icon-drawer.open { bottom: 0; }
        .icon-item { font-size: 40px; text-align: center; cursor: pointer; padding: 10px; background: #222; border-radius: 10px; }

        /* פופ-אפ טקסט */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .modal textarea {
            width: 100%; height: 120px; background: #222; color: white; border: 2px solid #007bff;
            border-radius: 15px; padding: 15px; font-size: 24px; text-align: center; outline: none;
        }
        .modal-btns { display: flex; gap: 10px; width: 100%; margin-top: 15px; }
        .modal-btns button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 18px; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="side-menu">
        <div class="menu-item" onclick="openTextModal()"><b>T</b><span>טקסט</span></div>
        <div class="menu-item" onclick="toggleIcons()"><b>⭐</b><span>אייקון</span></div>
        <label class="menu-item"><b>🖼️</b><span>תמונה</span><input type="file" id="imageLoader" accept="image/*"></label>
        
        <div class="menu-item">
            <div class="color-picker-btn">
                <input type="color" id="colorInput" value="#ffffff">
            </div>
            <span>צבע</span>
        </div>

        <div class="menu-item" onclick="changeBg()"><b>🎨</b><span>רקע</span></div>
        <div class="menu-item" onclick="deleteObj()" style="border-color: #551a1a;"><b>🗑️</b><span>מחק</span></div>
        
        <div class="menu-item" onclick="shareImg()" style="background: #25d366; border:none; margin-top: auto;"><b>💾</b><span>שמור</span></div>
    </div>

    <div class="main-editor">
        <div id="canvas-wrapper"><canvas id="storyCanvas"></canvas></div>
    </div>

    <div id="iconDrawer" class="icon-drawer">
        <div class="icon-item" onclick="addIcon('heart')">❤️</div>
        <div class="icon-item" onclick="addIcon('star')">⭐</div>
        <div class="icon-item" onclick="addIcon('fire')">🔥</div>
        <div class="icon-item" onclick="addIcon('check')">✅</div>
        <div class="icon-item" onclick="addIcon('crown')">👑</div>
        <div class="icon-item" onclick="addIcon('zap')">⚡</div>
        <div class="icon-item" onclick="addIcon('location')">📍</div>
        <div class="icon-item" onclick="addIcon('thumbsup')">👍</div>
    </div>

    <div id="textModal" class="modal">
        <textarea id="modalInput" placeholder="מה לכתוב?"></textarea>
        <div class="modal-btns">
            <button onclick="closeModal()" style="background:#444; color:white;">ביטול</button>
            <button onclick="saveTextFromModal()" style="background:#007bff; color:white;">אישור</button>
        </div>
    </div>

    <script>
        // התאמה למובייל - גובה מסך אמיתי
        const updateVH = () => document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
        window.addEventListener('resize', updateVH);
        updateVH();

        const canvas = new fabric.Canvas('storyCanvas', { width: 1080, height: 1920, backgroundColor: '#001f3f' });
        let currentEditingText = null;

        function fitCanvas() {
            const wrapper = document.querySelector('.main-editor');
            const scale = Math.min((wrapper.clientWidth-20)/1080, (wrapper.clientHeight-20)/1920);
            canvas.setZoom(scale); canvas.setWidth(1080 * scale); canvas.setHeight(1920 * scale);
        }

        function loadLogo() {
            fabric.Image.fromURL('logo.png', function(img) {
                img.set({ left: 540, top: 180, originX: 'center', selectable: false, evented: false });
                img.scaleToWidth(350); canvas.add(img); canvas.renderAll();
            });
        }

        // שינוי צבע לאובייקט נבחר
        document.getElementById('colorInput').oninput = function() {
            const active = canvas.getActiveObject();
            if (active) {
                if (active.type === 'i-text' || active.type === 'text') active.set('fill', this.value);
                else if (active.type === 'path') active.set('fill', this.value);
                canvas.renderAll();
            }
        };

        // הוספת אייקון (SVG)
        const svgs = {
            heart: 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z',
            star: 'M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z',
            fire: 'M13.5,0.67c0,0-2.34,5.15-5.32,6.31C6,7.7,4.3,10.7,4.3,12.61c0,3.34,2.72,6.06,6.06,6.06c3.34,0,6.06-2.72,6.06-6.06 c0-3.13-2.54-5.67-5.67-5.67',
            check: 'M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z',
            crown: 'M5 16h14a2 2 0 0 0 2-2V5l-5 4-4-4-4 4-5-4v9a2 2 0 0 0 2 2z',
            zap: 'M7 2v11h3v9l7-12h-4l4-8z'
        };

        function addIcon(name) {
            const path = new fabric.Path(svgs[name] || svgs.heart);
            path.set({ left: 540, top: 1000, scaleX: 5, scaleY: 5, fill: '#fff', originX: 'center', originY: 'center' });
            canvas.add(path); canvas.setActiveObject(path); toggleIcons();
        }

        function toggleIcons() { document.getElementById('iconDrawer').classList.toggle('open'); }

        function openTextModal(existing = null) {
            currentEditingText = existing;
            document.getElementById('modalInput').value = existing ? existing.text : '';
            document.getElementById('textModal').style.display = 'flex';
            setTimeout(() => document.getElementById('modalInput').focus(), 150);
        }

        function closeModal() { document.getElementById('textModal').style.display = 'none'; }

        function saveTextFromModal() {
            const val = document.getElementById('modalInput').value;
            if (!val) { closeModal(); return; }
            if (currentEditingText) currentEditingText.set('text', val);
            else {
                const text = new fabric.IText(val, {
                    left: 540, top: 960, fontFamily: 'FtMonopol', fill: 'white',
                    fontSize: 100, textAlign: 'center', originX: 'center', direction: 'rtl'
                });
                text.on('mousedblclick', () => openTextModal(text));
                canvas.add(text); canvas.setActiveObject(text);
            }
            canvas.renderAll(); closeModal();
        }

        const bgColors = ['#001f3f', '#000', '#fff', '#e74c3c', '#2ecc40'];
        let bIdx = 0;
        function changeBg() { bIdx = (bIdx+1)%bgColors.length; canvas.setBackgroundColor(bgColors[bIdx], canvas.renderAll.bind(canvas)); }

        document.getElementById('imageLoader').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    img.scaleToWidth(700); img.set({ left: 540, top: 1100, originX: 'center', originY: 'center' });
                    canvas.add(img); canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function deleteObj() { const a = canvas.getActiveObject(); if(a && a.selectable !== false) canvas.remove(a); }

        // שמירה ושיתוף כ-JPEG
        async function shareImg() {
            canvas.setZoom(1); canvas.setWidth(1080); canvas.setHeight(1920);
            canvas.getElement().toBlob(async (blob) => {
                const file = new File([blob], 'story.jpg', { type: 'image/jpeg' });
                if (navigator.share) await navigator.share({ files: [file] });
                else {
                    const l = document.createElement('a');
                    l.download = 'story.jpg';
                    l.href = canvas.toDataURL({ format: 'jpeg', quality: 1.0 });
                    l.click();
                }
                fitCanvas();
            }, 'image/jpeg', 1.0);
        }

        window.addEventListener('resize', fitCanvas);
        document.fonts.ready.then(() => { fitCanvas(); loadLogo(); });
    </script>
</body>
</html>
