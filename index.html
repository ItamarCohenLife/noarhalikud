<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Story Pro Editor - Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        @font-face { font-family: 'FtMonopol'; src: url('FtMonopol-Bold.woff2') format('woff2'); font-weight: bold; }
        @font-face { font-family: 'FtMonopol'; src: url('FtMonopol-Regular.woff2') format('woff2'); font-weight: normal; }

        :root { --vh: 1vh; --accent: #007bff; --bg: #050505; --panel: #1a1a1a; }

        * { 
            box-sizing: border-box; 
            font-family: 'FtMonopol', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: white;
            height: calc(var(--vh, 1vh) * 100);
            width: 100vw;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        .app-bar {
            height: 60px;
            background: var(--panel);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            padding-top: env(safe-area-inset-top);
            border-bottom: 1px solid #333;
            z-index: 100;
        }

        .logo { font-weight: bold; font-size: 18px; color: var(--accent); }

        .editor-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        #canvas-wrapper { 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
            background: #111;
        }

        .toolbar {
            position: absolute;
            bottom: calc(20px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 40px;
            display: flex;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
        }
        .tool-btn i { font-size: 20px; font-style: normal; }
        .tool-btn span { font-size: 10px; font-weight: bold; opacity: 0.7; }
        .tool-btn:disabled { opacity: 0.2; }

        .floating-menu {
            position: absolute;
            display: none;
            background: var(--accent);
            border-radius: 12px;
            padding: 5px;
            gap: 5px;
            z-index: 150;
        }
        .floating-menu button {
            background: white; border: none; border-radius: 8px; padding: 6px 12px;
            font-size: 12px; font-weight: bold; cursor: pointer;
        }

        /* תיקון מסך עריכת טקסט */
        #textEditorOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999; /* הכי גבוה שיש */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #textEditorInput {
            width: 100%;
            max-width: 600px;
            background: transparent;
            border: none;
            color: white;
            font-size: 32px;
            text-align: center;
            outline: none;
            direction: rtl;
            margin-bottom: 30px;
            user-select: text; /* מאפשר בחירת טקסט להקלדה */
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 18px 60px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            z-index: 10001;
        }

        .color-preview { width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body>

    <div class="app-bar">
        <div class="logo">STORY PRO</div>
        <div style="display: flex; gap: 15px;">
            <button class="tool-btn" onclick="undo()" id="undoBtn"><i>↩️</i></button>
            <button class="tool-btn" onclick="shareImg()"><i>💾</i></button>
        </div>
    </div>

    <div class="editor-container">
        <div id="canvas-wrapper"><canvas id="storyCanvas"></canvas></div>
        <div id="floatingMenu" class="floating-menu">
            <button onclick="duplicateObj()">שכפל</button>
            <button onclick="deleteObj()" style="color: #ff4444;">מחק</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="openTextEditor()"><i>T</i><span>טקסט</span></button>
        <button class="tool-btn" onclick="addIcon()"><i>❤️</i><span>אייקון</span></button>
        <label class="tool-btn"><i>🖼️</i><span>תמונה</span><input type="file" id="imageLoader" accept="image/*" style="display:none"></label>
        <button class="tool-btn" id="boldBtn" onclick="toggleWeight()" disabled><i>B</i><span>עובי</span></button>
        <button class="tool-btn" onclick="document.getElementById('colorInput').click()">
            <div class="color-preview" id="colorDisplay" style="background: white;"></div><span>צבע</span>
            <input type="color" id="colorInput" style="display:none">
        </button>
        <button class="tool-btn" onclick="changeBg()"><i>🎨</i><span>רקע</span></button>
        <button class="tool-btn" onclick="resetCanvas()"><i>🔄</i><span>איפוס</span></button>
    </div>

    <div id="textEditorOverlay">
        <textarea id="textEditorInput" placeholder="הקלידו כאן..."></textarea>
        <button class="btn-primary" id="btnDone">סיום</button>
    </div>

    <script>
        // חישוב גובה מסך לאייפון
        const updateVh = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
        window.addEventListener('resize', updateVh);
        updateVh();

        const canvas = new fabric.Canvas('storyCanvas', {
            width: 1080, height: 1920, backgroundColor: '#001f3f'
        });

        const bgOptions = ['#001f3f', '#87CEEB'];
        let bgIdx = 0, history = [];

        fabric.Object.prototype.set({
            transparentCorners: false, cornerColor: '#007bff', cornerStrokeColor: '#ffffff',
            cornerStyle: 'circle', cornerSize: 30, padding: 15
        });
        fabric.Object.prototype.setControlsVisibility({ mt: false, mb: false, ml: false, mr: false });

        function resizeCanvas() {
            const container = document.querySelector('.editor-container');
            const scale = Math.min((container.clientWidth - 40) / 1080, (container.clientHeight - 100) / 1920);
            canvas.setZoom(scale);
            canvas.setWidth(1080 * scale); canvas.setHeight(1920 * scale);
            const wrapper = document.getElementById('canvas-wrapper');
            wrapper.style.width = canvas.width + "px"; wrapper.style.height = canvas.height + "px";
        }

        // עריכת טקסט - לוגיקה מתוקנת
        const overlay = document.getElementById('textEditorOverlay');
        const textInput = document.getElementById('textEditorInput');
        const btnDone = document.getElementById('btnDone');
        let currentEditingObj = null;

        function openTextEditor(obj = null) {
            currentEditingObj = obj;
            textInput.value = obj ? obj.text : "";
            overlay.style.display = 'flex';
            setTimeout(() => textInput.focus(), 150);
        }

        function handleDone() {
            const val = textInput.value.trim();
            if (val) {
                if (currentEditingObj) {
                    currentEditingObj.set('text', val);
                } else {
                    const t = new fabric.IText(val, {
                        left: 540, top: 960, fontFamily: 'FtMonopol', fontSize: 100, fill: 'white',
                        textAlign: 'center', originX: 'center', fontWeight: 'bold', direction: 'rtl', editable: false
                    });
                    t.on('mousedblclick', () => openTextEditor(t));
                    canvas.add(t); canvas.setActiveObject(t);
                }
                canvas.renderAll();
                saveState();
            }
            overlay.style.display = 'none';
            currentEditingObj = null;
        }

        // אישור בלחיצה על הכפתור או ב-Enter
        btnDone.onclick = (e) => { e.preventDefault(); handleDone(); };
        textInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleDone(); } };

        canvas.on('selection:created', updateUI);
        canvas.on('selection:updated', updateUI);
        canvas.on('selection:cleared', () => {
            document.getElementById('floatingMenu').style.display = 'none';
            document.getElementById('boldBtn').disabled = true;
        });

        function updateUI(e) {
            const obj = e.target;
            const menu = document.getElementById('floatingMenu');
            const rect = obj.getBoundingRect();
            menu.style.display = 'flex';
            menu.style.left = `${rect.left + rect.width / 2 - 40}px`;
            menu.style.top = `${rect.top - 55}px`;
            document.getElementById('boldBtn').disabled = !(obj.type === 'i-text' && !obj.isIcon);
        }

        function toggleWeight() {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set('fontWeight', obj.fontWeight === 'bold' ? 'normal' : 'bold');
                canvas.renderAll(); saveState();
            }
        }

        document.getElementById('colorInput').oninput = function() {
            const obj = canvas.getActiveObject();
            document.getElementById('colorDisplay').style.backgroundColor = this.value;
            if (obj && obj.type === 'i-text' && !obj.isIcon) {
                obj.set('fill', this.value); canvas.renderAll();
            }
        };

        function addIcon() {
            const heart = new fabric.IText('❤️', { left: 540, top: 1100, fontSize: 150, originX: 'center', isIcon: true, editable: false });
            canvas.add(heart); canvas.setActiveObject(heart); saveState();
        }

        document.getElementById('imageLoader').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    img.scaleToWidth(600); img.set({ left: 540, top: 1100, originX: 'center' });
                    canvas.add(img); canvas.sendToBack(img); canvas.setActiveObject(img); saveState();
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function changeBg() {
            bgIdx = (bgIdx + 1) % bgOptions.length;
            canvas.setBackgroundColor(bgOptions[bgIdx], () => { canvas.renderAll(); saveState(); });
        }

        function duplicateObj() {
            const obj = canvas.getActiveObject();
            if (obj) obj.clone((cloned) => {
                cloned.set({ left: obj.left + 40, top: obj.top + 40 });
                canvas.add(cloned); canvas.setActiveObject(cloned); saveState();
            });
        }

        function deleteObj() {
            const obj = canvas.getActiveObject();
            if (obj) { canvas.remove(obj); canvas.discardActiveObject(); canvas.renderAll(); saveState(); }
        }

        function resetCanvas() {
            if (confirm("לאפס את הכל?")) { canvas.clear(); bgIdx = 0; canvas.setBackgroundColor(bgOptions[0], () => { canvas.renderAll(); saveState(); }); }
        }

        function saveState() { history.push(JSON.stringify(canvas.toJSON(['fontWeight', 'isIcon']))); if(history.length > 20) history.shift(); }
        function undo() { if(history.length > 1) { history.pop(); canvas.loadFromJSON(history[history.length-1], () => canvas.renderAll()); } }

        async function shareImg() {
            canvas.setZoom(1); canvas.setWidth(1080); canvas.setHeight(1920);
            canvas.discardActiveObject().renderAll();
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 0.95 });
            resizeCanvas();
            const blob = await (await fetch(dataURL)).blob();
            const file = new File([blob], 'story.jpg', { type: 'image/jpeg' });
            if (navigator.share) navigator.share({ files: [file] });
            else { const a = document.createElement('a'); a.href = dataURL; a.download = 'story.jpg'; a.click(); }
        }

        window.addEventListener('resize', resizeCanvas);
        document.fonts.ready.then(() => { resizeCanvas(); saveState(); });
    </script>
</body>
</html>
