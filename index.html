<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Story Pro Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        @font-face { font-family: 'FtMonopol'; src: url('FtMonopol-Bold.woff2') format('woff2'); font-weight: bold; }
        @font-face { font-family: 'FtMonopol'; src: url('FtMonopol-Regular.woff2') format('woff2'); font-weight: normal; }

        :root { --vh: 1vh; --accent: #007bff; --bg: #0a0a0a; --panel: #1a1a1a; }

        * { box-sizing: border-box; font-family: 'FtMonopol', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg); color: white; margin: 0;
            height: calc(var(--vh) * 100); width: 100vw;
            overflow: hidden; position: fixed; display: flex; flex-direction: column;
        }

        /* סרגל עליון - לוגו ופעולות מערכת */
        .app-bar {
            height: 60px; background: var(--panel); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #333; z-index: 100;
        }

        .logo { font-weight: bold; font-size: 18px; color: var(--accent); }

        /* אזור העריכה */
        .editor-container {
            flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center;
            overflow: hidden; touch-action: none;
        }

        #canvas-wrapper { box-shadow: 0 10px 50px rgba(0,0,0,0.5); position: relative; }

        /* סרגל כלים תחתון צף */
        .toolbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 30px; display: flex; gap: 15px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .tool-btn {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            background: transparent; border: none; color: white; cursor: pointer; transition: 0.2s;
        }
        .tool-btn:active { transform: scale(0.85); opacity: 0.7; }
        .tool-btn i { font-size: 20px; font-style: normal; }
        .tool-btn span { font-size: 10px; font-weight: bold; opacity: 0.8; }

        /* סרגל עריכה מהיר (מופיע כשמשהו נבחר) */
        .floating-edit-menu {
            position: absolute; display: none; background: var(--accent);
            border-radius: 8px; padding: 5px; gap: 5px; z-index: 150;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .floating-edit-menu button {
            background: white; border: none; border-radius: 4px; padding: 5px 10px;
            font-size: 12px; font-weight: bold; cursor: pointer;
        }

        /* חלון הקלדה */
        #textEditorOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        #textEditorInput {
            width: 100%; max-width: 600px; background: transparent; border: none;
            color: white; font-size: 40px; text-align: center; outline: none;
            direction: rtl; line-height: 1.2; margin-bottom: 30px;
        }

        .btn-primary { background: white; color: black; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; }
        
        .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body>

    <div class="app-bar">
        <div class="logo">STORY PRO</div>
        <div style="display: flex; gap: 10px;">
            <button class="tool-btn" onclick="undo()" id="undoBtn"><i>↩️</i></button>
            <button class="tool-btn" onclick="redo()" id="redoBtn"><i>↪️</i></button>
            <button class="tool-btn" onclick="shareImg()"><i>💾</i><span>שמור</span></button>
        </div>
    </div>

    <div class="editor-container">
        <div id="canvas-wrapper">
            <canvas id="storyCanvas"></canvas>
        </div>

        <div id="floatingMenu" class="floating-edit-menu">
            <button onclick="duplicateObj()">שכפל</button>
            <button onclick="deleteObj()" style="color: red;">מחק</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="openTextEditor()"><i>T</i><span>טקסט</span></button>
        <button class="tool-btn" onclick="addIcon()"><i>❤️</i><span>אייקון</span></button>
        <label class="tool-btn"><i>🖼️</i><span>תמונה</span><input type="file" id="imageLoader" accept="image/*" style="display:none"></label>
        <button class="tool-btn" id="weightToggle" onclick="toggleWeight()"><i>B</i><span>עובי</span></button>
        <button class="tool-btn" onclick="document.getElementById('colorInput').click()">
            <div class="color-dot" id="colorDisplay"></div><span>צבע</span>
            <input type="color" id="colorInput" style="display:none">
        </button>
        <button class="tool-btn" onclick="changeBg()"><i>🎨</i><span>רקע</span></button>
        <button class="tool-btn" onclick="resetCanvas()"><i>🔄</i><span>איפוס</span></button>
    </div>

    <div id="textEditorOverlay">
        <textarea id="textEditorInput" placeholder="הקלידו משהו..."></textarea>
        <button class="btn-primary" onclick="closeTextEditor(true)">סיום</button>
    </div>

    <script>
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const canvas = new fabric.Canvas('storyCanvas', {
            width: 1080, height: 1920, backgroundColor: '#001f3f'
        });

        const bgOptions = ['#001f3f', '#87CEEB'];
        let bgIdx = 0;
        let stateStack = [];

        fabric.Object.prototype.set({
            transparentCorners: false, cornerColor: '#007bff', cornerStrokeColor: '#ffffff',
            cornerStyle: 'circle', cornerSize: isMobile ? 45 : 20, padding: 12
        });
        fabric.Object.prototype.setControlsVisibility({ mt: false, mb: false, ml: false, mr: false });

        // פונקציה להתאמת הקנבס למסך
        function resize() {
            const container = document.querySelector('.editor-container');
            const padding = 40;
            const scale = Math.min(
                (container.clientWidth - padding) / 1080,
                (container.clientHeight - padding) / 1920
            );
            canvas.setZoom(scale);
            canvas.setWidth(1080 * scale);
            canvas.setHeight(1920 * scale);
            
            const wrapper = document.getElementById('canvas-wrapper');
            wrapper.style.width = canvas.width + "px";
            wrapper.style.height = canvas.height + "px";
        }

        // ניהול תפריט צף
        canvas.on('selection:created', showFloatingMenu);
        canvas.on('selection:updated', showFloatingMenu);
        canvas.on('selection:cleared', () => document.getElementById('floatingMenu').style.display = 'none');
        canvas.on('object:moving', () => document.getElementById('floatingMenu').style.display = 'none');

        function showFloatingMenu(e) {
            const obj = e.target;
            const menu = document.getElementById('floatingMenu');
            const bound = obj.getBoundingRect();
            menu.style.display = 'flex';
            menu.style.left = (bound.left + bound.width/2 - 40) + "px";
            menu.style.top = (bound.top - 50) + "px";
            
            // עדכון מצב כפתור B
            const weightBtn = document.getElementById('weightToggle');
            if (obj.type === 'i-text' && !obj.isIcon) {
                weightBtn.style.opacity = "1";
            } else {
                weightBtn.style.opacity = "0.3";
            }
        }

        // פעולות טקסט
        function openTextEditor(obj = null) {
            const overlay = document.getElementById('textEditorOverlay');
            const input = document.getElementById('textEditorInput');
            input.value = obj ? obj.text : "";
            overlay.style.display = 'flex';
            input.focus();
            window.activeObj = obj;
        }

        function closeTextEditor(save) {
            const val = document.getElementById('textEditorInput').value.trim();
            if (save && val) {
                if (window.activeObj) {
                    window.activeObj.set('text', val);
                } else {
                    const t = new fabric.IText(val, {
                        left: 540, top: 960, fontFamily: 'FtMonopol', fontSize: 100, fill: 'white',
                        textAlign: 'center', originX: 'center', fontWeight: 'bold', direction: 'rtl', editable: false
                    });
                    t.on('mousedblclick', () => openTextEditor(t));
                    canvas.add(t); canvas.setActiveObject(t);
                }
                canvas.renderAll(); saveState();
            }
            document.getElementById('textEditorOverlay').style.display = 'none';
        }

        function toggleWeight() {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text' && !obj.isIcon) {
                obj.set('fontWeight', obj.fontWeight === 'bold' ? 'normal' : 'bold');
                canvas.renderAll(); saveState();
            }
        }

        document.getElementById('colorInput').oninput = function() {
            const obj = canvas.getActiveObject();
            document.getElementById('colorDisplay').style.backgroundColor = this.value;
            if (obj && obj.type === 'i-text' && !obj.isIcon) {
                obj.set('fill', this.value); canvas.renderAll();
            }
        };

        function duplicateObj() {
            const obj = canvas.getActiveObject();
            if (!obj) return;
            obj.clone((cloned) => {
                cloned.set({ left: obj.left + 50, top: obj.top + 50 });
                canvas.add(cloned); canvas.setActiveObject(cloned); saveState();
            });
        }

        function deleteObj() {
            const obj = canvas.getActiveObject();
            if (obj) { canvas.remove(obj); canvas.discardActiveObject(); saveState(); }
        }

        function changeBg() {
            bgIdx = (bgIdx + 1) % bgOptions.length;
            canvas.setBackgroundColor(bgOptions[bgIdx], () => { canvas.renderAll(); saveState(); });
        }

        function addIcon() {
            const i = new fabric.IText('❤️', { left: 540, top: 1100, fontSize: 150, originX: 'center', isIcon: true, editable: false });
            canvas.add(i); canvas.setActiveObject(i); saveState();
        }

        document.getElementById('imageLoader').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    img.scaleToWidth(600); img.set({ left: 540, top: 1100, originX: 'center' });
                    canvas.add(img); canvas.sendToBack(img); canvas.setActiveObject(img); saveState();
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function resetCanvas() {
            if (confirm("להתחיל מחדש?")) { canvas.getObjects().forEach(o => canvas.remove(o)); saveState(); }
        }

        function saveState() { stateStack.push(canvas.toJSON(['fontWeight', 'isIcon'])); }
        function undo() { if (stateStack.length > 1) { stateStack.pop(); canvas.loadFromJSON(stateStack[stateStack.length-1], () => canvas.renderAll()); } }

        async function shareImg() {
            const zoom = canvas.getZoom();
            canvas.setZoom(1);
            canvas.setWidth(1080); canvas.setHeight(1920);
            canvas.discardActiveObject().renderAll();
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 0.9 });
            resize(); 
            const blob = await (await fetch(dataURL)).blob();
            const file = new File([blob], 'story.jpg', { type: 'image/jpeg' });
            if (navigator.share && isMobile) navigator.share({ files: [file] });
            else { const l = document.createElement('a'); l.download = 'story.jpg'; l.href = dataURL; l.click(); }
        }

        window.addEventListener('resize', resize);
        document.fonts.ready.then(() => { resize(); saveState(); });
    </script>
</body>
</html>
