<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>יוצר סטורי - FtMonopol</title>
    <style>
        @font-face {
            font-family: 'FtMonopol';
            src: url('FtMonopol-Bold.woff2') format('woff2');
            font-weight: bold;
            font-style: normal;
        }

        body {
            font-family: 'FtMonopol', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
            color: #333;
        }

        .editor-box {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            text-align: center;
        }

        h2 { color: #001f3f; margin-bottom: 15px; font-size: 24px; }

        textarea {
            width: 100%;
            height: 150px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            font-size: 18px;
            font-family: 'FtMonopol', sans-serif;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
            resize: none;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-family: 'FtMonopol', sans-serif;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        #generateBtn { background-color: #001f3f; color: white; }
        #downloadBtn { background-color: #28a745; color: white; display: none; }
        #shareBtn { background-color: #25d366; color: white; display: none; } /* צבע וואטסאפ */

        #storyCanvas {
            margin-top: 20px;
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            display: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="editor-box">
        <h2>מחולל סטורי</h2>
        <textarea id="userInput" placeholder="הקלד את המסר שלך כאן..."></textarea>
        
        <div class="btn-group">
            <button id="generateBtn">צור תמונה</button>
            <button id="shareBtn">שתף קובץ לוואטסאפ</button>
            <button id="downloadBtn">שמור לגלריה</button>
        </div>
    </div>

    <canvas id="storyCanvas" width="1080" height="1920"></canvas>

    <script>
        const canvas = document.getElementById('storyCanvas');
        const ctx = canvas.getContext('2d');
        const userInput = document.getElementById('userInput');
        const generateBtn = document.getElementById('generateBtn');
        const shareBtn = document.getElementById('shareBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }

        async function draw() {
            const text = userInput.value.trim();
            if (!text) return;

            try {
                await document.fonts.load('10pt "FtMonopol"');
                const logo = await loadImage('logo.png');

                ctx.fillStyle = '#001f3f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const logoWidth = 250;
                const logoHeight = (logo.height / logo.width) * logoWidth;
                ctx.drawImage(logo, (canvas.width / 2) - (logoWidth / 2), 150, logoWidth, logoHeight);

                ctx.direction = 'rtl';
                ctx.fillStyle = 'white';
                ctx.font = '85px "FtMonopol"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const maxWidth = 900;
                const lineHeight = 110;
                const paragraphs = text.split('\n');
                let allLines = [];

                paragraphs.forEach(para => {
                    const words = para.split(' ');
                    let currentLine = '';
                    for (let n = 0; n < words.length; n++) {
                        let testLine = currentLine + (currentLine === '' ? '' : ' ') + words[n];
                        if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                            allLines.push(currentLine);
                            currentLine = words[n];
                        } else {
                            currentLine = testLine;
                        }
                    }
                    allLines.push(currentLine);
                });

                const totalTextHeight = allLines.length * lineHeight;
                let y = (canvas.height / 2) - (totalTextHeight / 2) + (lineHeight / 2) + 50;

                allLines.forEach(line => {
                    ctx.fillText(line, canvas.width / 2, y);
                    y += lineHeight;
                });

                canvas.style.display = 'block';
                downloadBtn.style.display = 'block';
                shareBtn.style.display = 'block'; // מציג את כפתור השיתוף
                canvas.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                alert("שגיאה בטעינת הקבצים");
            }
        }

        // פונקציית השיתוף כקובץ
        async function shareImage() {
            if (!navigator.share) {
                alert("הדפדפן שלך לא תומך בשיתוף ישיר. השתמש בכפתור השמירה.");
                return;
            }

            canvas.toBlob(async (blob) => {
                const file = new File([blob], 'story.png', { type: 'image/png' });
                try {
                    await navigator.share({
                        files: [file],
                        title: 'הסטורי שלי',
                        text: 'נוצר ב-FtMonopol'
                    });
                } catch (err) {
                    console.log("השיתוף בוטל או נכשל");
                }
            }, 'image/png');
        }

        generateBtn.addEventListener('click', draw);
        shareBtn.addEventListener('click', shareImage);
        
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'story.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
