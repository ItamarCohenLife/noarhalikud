<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>עיצוב סטורי - צוות דוברות</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        @font-face {
            font-family: 'FtMonopol';
            src: url('FtMonopol-Bold.woff2') format('woff2');
            font-weight: bold;
        }
        @font-face {
            font-family: 'FtMonopol';
            src: url('FtMonopol-Regular.woff2') format('woff2');
            font-weight: normal;
        }

        :root { --vh: 1vh; }

        * { 
            box-sizing: border-box; 
            font-family: 'FtMonopol', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            background-color: #000;
            color: white;
            margin: 0;
            display: flex;
            height: calc(var(--vh) * 100);
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        .side-menu {
            width: 90px;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom) 8px;
            gap: 10px;
            border-left: 1px solid #333;
            z-index: 100;
        }

        .menu-item {
            background: #1e1e1e;
            border: 1px solid #444;
            color: white;
            width: 100%;
            min-height: 70px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-item:active { background: #333; transform: scale(0.95); }
        .menu-item b { font-size: 20px; }
        .menu-item span { font-size: 11px; margin-top: 4px; font-weight: bold; }

        .save-btn { background: #333 !important; border: 1px solid #555 !important; margin-top: auto; height: 80px; }

        .top-tools {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 50; align-items: center;
        }

        .tool-group {
            display: flex; background: rgba(30,30,30,0.95); padding: 4px; border-radius: 50px; border: 1px solid #444;
        }

        .tool-btn {
            padding: 8px 14px; border-radius: 50px; border: none; color: #fff; background: transparent; cursor: pointer; 
            font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px;
        }

        /* חלון עריכת טקסט */
        #textEditorOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #textEditorInput {
            width: 100%; max-width: 500px; background: transparent; border: none;
            color: white; font-size: 32px; text-align: center; outline: none;
            direction: rtl; line-height: 1.2; margin-bottom: 30px;
        }

        .editor-btns { display: flex; gap: 15px; width: 100%; max-width: 400px; }
        .editor-btns button { flex: 1; padding: 15px; border-radius: 50px; border: none; font-weight: bold; }

        .main-editor {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #050505; position: relative;
        }

        #canvas-wrapper { 
            box-shadow: 0 0 30px rgba(255,255,255,0.05); 
            border: 2px solid #222; /* מסגרת ברורה לסטורי */
            overflow: hidden;
        }

        .color-circle { position: relative; width: 26px; height: 26px; border-radius: 50%; border: 2px solid white; background: linear-gradient(45deg, red, blue, green); }
        input[type="color"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="textEditorOverlay">
        <textarea id="textEditorInput" placeholder="הקלידו כאן..."></textarea>
        <div class="editor-btns">
            <button onclick="closeTextEditor(false)" style="background:#333; color:white;">ביטול</button>
            <button onclick="closeTextEditor(true)" style="background:white; color:black;">אישור</button>
        </div>
    </div>

    <div class="side-menu">
        <div class="menu-item" onclick="openTextEditor()"><b>T</b><span>טקסט</span></div>
        <div class="menu-item" onclick="addIcon('heart')"><b>❤️</b><span>אייקון</span></div>
        <label class="menu-item"><b>🖼️</b><span>תמונה</span><input type="file" id="imageLoader" accept="image/*"></label>
        <div class="menu-item">
            <div class="color-circle"><input type="color" id="colorInput" value="#ffffff"></div>
            <span>צבע טקסט</span>
        </div>
        <div class="menu-item" onclick="changeBg()"><b>🎨</b><span>רקע</span></div>
        <div class="menu-item" onclick="deleteObj()" style="border-color: #551a1a;"><b>🗑️</b><span>מחק</span></div>
        <div class="menu-item save-btn" onclick="shareImg()"><b>💾</b><span>שמור</span></div>
    </div>

    <div class="main-editor">
        <div class="top-tools">
            <div class="tool-group">
                <button class="tool-btn" onclick="undo()" id="undoBtn">↪️ חזור</button>
                <button class="tool-btn" onclick="redo()" id="redoBtn">↩️</button>
            </div>
            <div class="tool-group">
                <button id="boldBtn" class="tool-btn active" onclick="updateSelectedWeight('bold')">מודגש</button>
                <button id="regBtn" class="tool-btn" onclick="updateSelectedWeight('normal')">רגיל</button>
            </div>
        </div>
        
        <div id="canvas-wrapper">
            <canvas id="storyCanvas"></canvas>
        </div>
    </div>

    <script>
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const canvas = new fabric.Canvas('storyCanvas', { 
            width: 1080, height: 1920, 
            backgroundColor: '#001f3f' // כחול כהה התחלתי
        });

        // הגבלת רקעים
        const bgOptions = ['#001f3f', '#87CEEB']; // כחול כהה, תכלת
        let bgIdx = 0;

        fabric.Object.prototype.set({
            transparentCorners: false, cornerColor: '#ffffff', cornerStrokeColor: '#007bff',
            cornerStyle: 'circle', cornerSize: isMobile ? 45 : 25, padding: 10, uniformScaling: true
        });
        fabric.Object.prototype.setControlsVisibility({ mt: false, mb: false, ml: false, mr: false });

        let stateStack = [];
        let redoStack = [];
        let isMoving = false;
        let activeTextObject = null;

        function saveState() {
            if (isMoving) return;
            stateStack.push(JSON.stringify(canvas.toJSON(['lineHeight', 'fontWeight', 'isIcon'])));
            redoStack = [];
            updateButtons();
        }

        function updateButtons() {
            document.getElementById('undoBtn').disabled = stateStack.length <= 1;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        function undo() {
            if (stateStack.length <= 1) return;
            redoStack.push(stateStack.pop());
            isMoving = true;
            canvas.loadFromJSON(stateStack[stateStack.length - 1], () => {
                canvas.renderAll(); isMoving = false; updateButtons();
            });
        }

        function redo() {
            if (redoStack.length === 0) return;
            const next = redoStack.pop();
            stateStack.push(next);
            isMoving = true;
            canvas.loadFromJSON(next, () => {
                canvas.renderAll(); isMoving = false; updateButtons();
            });
        }

        // עריכת טקסט
        function openTextEditor(obj = null) {
            activeTextObject = obj;
            const overlay = document.getElementById('textEditorOverlay');
            const input = document.getElementById('textEditorInput');
            input.value = obj ? obj.text : "";
            overlay.style.display = 'flex';
            setTimeout(() => input.focus(), 100);
        }

        function closeTextEditor(shouldSave) {
            const val = document.getElementById('textEditorInput').value.trim();
            if (shouldSave && val) {
                if (activeTextObject) {
                    activeTextObject.set('text', val);
                } else {
                    const text = new fabric.IText(val, {
                        left: 540, top: 960, fontFamily: 'FtMonopol', fontSize: 110, fill: 'white',
                        textAlign: 'center', originX: 'center', originY: 'center', fontWeight: 'bold',
                        lineHeight: 0.8, direction: 'rtl', editable: false
                    });
                    text.on('mousedblclick', () => openTextEditor(text));
                    canvas.add(text); canvas.setActiveObject(text);
                }
                canvas.renderAll(); saveState();
            }
            document.getElementById('textEditorOverlay').style.display = 'none';
            activeTextObject = null;
        }

        function updateSelectedWeight(w) {
            const active = canvas.getActiveObject();
            if (active && active.type === 'i-text' && !active.isIcon) {
                active.set('fontWeight', w);
                canvas.renderAll(); saveState();
            }
        }

        document.getElementById('colorInput').oninput = function() {
            const active = canvas.getActiveObject();
            // צבע משתנה רק אם זה טקסט ולא אייקון
            if (active && active.type === 'i-text' && !active.isIcon) {
                active.set('fill', this.value);
                canvas.renderAll();
            }
        };
        document.getElementById('colorInput').onchange = saveState;

        // אייקונים (צבע מקובע)
        function addIcon(type) {
            const icons = { heart: '❤️' };
            const text = new fabric.IText(icons[type], {
                left: 540, top: 1100, fontSize: 150, originX: 'center', originY: 'center',
                isIcon: true, selectable: true, editable: false
            });
            canvas.add(text); canvas.setActiveObject(text); saveState();
        }

        // ניהול תנועה מוגבלת במובייל / חסומה במחשב
        let isDragging = false, lastPosX, lastPosY;
        canvas.on('mouse:down', function(opt) {
            if (isMobile && !canvas.getActiveObject()) {
                isDragging = true;
                lastPosX = opt.e.touches ? opt.e.touches[0].clientX : opt.e.clientX;
                lastPosY = opt.e.touches ? opt.e.touches[0].clientY : opt.e.clientY;
            }
        });

        canvas.on('mouse:move', function(opt) {
            if (isDragging && isMobile) {
                const e = opt.e;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                let newX = canvas.viewportTransform[4] + (clientX - lastPosX);
                let newY = canvas.viewportTransform[5] + (clientY - lastPosY);

                // הגבלת תנועה "מעט מסביב" (טווח של 100 פיקסלים)
                const limit = 100;
                const wrapper = document.querySelector('.main-editor');
                const baseScale = Math.min((wrapper.clientWidth-40)/1080, (wrapper.clientHeight-120)/1920);
                const centerX = (wrapper.clientWidth - 1080 * baseScale) / 2;
                const centerY = (wrapper.clientHeight - 1920 * baseScale) / 2;

                if (Math.abs(newX - centerX) < limit) canvas.viewportTransform[4] = newX;
                if (Math.abs(newY - centerY) < limit) canvas.viewportTransform[5] = newY;

                canvas.requestRenderAll();
                lastPosX = clientX; lastPosY = clientY;
            }
        });
        canvas.on('mouse:up', () => isDragging = false);

        function resetView() {
            const wrapper = document.querySelector('.main-editor');
            const scale = Math.min((wrapper.clientWidth-40)/1080, (wrapper.clientHeight-120)/1920);
            canvas.setViewportTransform([scale, 0, 0, scale, (wrapper.clientWidth - 1080 * scale) / 2, (wrapper.clientHeight - 1920 * scale) / 2]);
        }

        function changeBg() {
            bgIdx = (bgIdx + 1) % bgOptions.length;
            canvas.setBackgroundColor(bgOptions[bgIdx], () => { canvas.renderAll(); saveState(); });
        }

        function deleteObj() { 
            const a = canvas.getActiveObject(); 
            if(a && a.selectable !== false) { canvas.remove(a); saveState(); }
        }

        async function shareImg() {
            canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);
            canvas.discardActiveObject().renderAll();
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 0.95 });
            resetView();
            const blob = await (await fetch(dataURL)).blob();
            const file = new File([blob], 'story.jpg', { type: 'image/jpeg' });
            if (navigator.share) navigator.share({ files: [file] });
            else { const l = document.createElement('a'); l.download = 'story.jpg'; l.href = dataURL; l.click(); }
        }

        window.addEventListener('resize', resetView);
        document.fonts.ready.then(() => { resetView(); saveState(); });
    </script>
</body>
</html>
