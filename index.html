<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>עורך סטורי - צוות דוברות</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        /* טעינת פונטים */
        @font-face { font-family: 'FbMonopolyHeb'; src: url('FbMonopolyHeb-Bold.otf') format('opentype'); font-weight: bold; }
        @font-face { font-family: 'FbMonopolyHeb'; src: url('FbMonopolyHeb-Regular.otf') format('opentype'); font-weight: normal; }

        :root { 
            --vh: 1vh; --accent: #007bff; --bg: #050505; --panel: #1a1a1a; 
            --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
            --brand-blue: #242362; /* הכחול החדש */
        }

        * { 
            box-sizing: border-box; font-family: 'FbMonopolyHeb', sans-serif; 
            -webkit-tap-highlight-color: transparent; margin: 0; padding: 0;
            user-select: none; touch-action: none; 
        }

        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; background-color: var(--bg); }
        body { display: flex; flex-direction: column; height: calc(var(--vh, 1vh) * 100); }

        /* סרגל עליון */
        .app-bar {
            height: 60px; background: var(--panel); display: flex; align-items: center; 
            justify-content: space-between; padding: var(--safe-top) 20px 0 20px; 
            border-bottom: 1px solid #333; z-index: 100;
        }
        .logo-top { font-weight: bold; font-size: 18px; color: #ffffff; }
        .logo-bottom { font-size: 11px; opacity: 0.6; color: #ffffff; letter-spacing: 1px; }

        /* אזור העבודה */
        .editor-container {
            flex: 1; position: relative; display: flex; align-items: center; 
            justify-content: center; background: #000; 
            overflow: hidden;
            padding: 40px 20px 120px 20px;
        }

        #canvas-wrapper { 
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 0 40px rgba(0,0,0,0.5); 
            position: relative; background: var(--brand-blue);
            transition: transform 0.2s ease;
        }

        /* טולבר */
        .toolbar {
            width: 90%; max-width: 480px; background: rgba(26,26,26,0.98); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 5px; border-radius: 30px; display: flex; 
            justify-content: space-evenly; gap: 2px; border: 1px solid rgba(255,255,255,0.1);
            position: absolute; bottom: calc(20px + var(--safe-bottom)); 
            left: 50%; transform: translateX(-50%); z-index: 500;
        }

        .tool-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: transparent; border: none; color: white; gap: 4px; cursor: pointer;
            transition: transform 0.1s active;
        }
        /* אפקט לחיצה */
        .tool-btn:active { transform: scale(0.9); }
        
        .tool-btn i { font-size: 18px; font-style: normal; }
        .tool-btn span { font-size: 9px; font-weight: bold; }

        /* מניו צף */
        .floating-menu {
            position: absolute; display: none; background: var(--accent);
            border-radius: 12px; padding: 5px; gap: 5px; z-index: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .floating-menu button {
            background: white; border: none; border-radius: 8px; 
            padding: 8px 14px; font-size: 12px; font-weight: bold; cursor: pointer;
        }
        /* כפתור אישור חיתוך ייחודי */
        #confirmCropBtn { background: #28a745; color: white; display: none; }

        /* עורך טקסט */
        #textEditorOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 2000; flex-direction: column; padding: 25px;
            padding-top: calc(50px + var(--safe-top));
        }
        #textEditorInput {
            width: 100%; flex: 1; background: transparent; border: none;
            color: white; font-size: 32px; text-align: center; outline: none;
            direction: rtl; font-family: 'FbMonopolyHeb', sans-serif; resize: none;
        }
        .btn-done {
            background: var(--accent); color: white; width: 100%; padding: 18px;
            border-radius: 20px; border: none; font-weight: bold; font-size: 18px;
            margin-bottom: var(--safe-bottom);
        }
        .color-preview { width: 18px; height: 18px; border-radius: 50%; border: 2px solid white; }
        
        .emoji-picker {
            display: none; position: absolute; bottom: 85px; background: var(--panel); 
            padding: 12px; border-radius: 20px; grid-template-columns: repeat(4, 1fr); 
            gap: 12px; border: 1px solid #444;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="app-bar">
        <div class="logo-area"><div class="logo-top">צוות דוברות</div><div class="logo-bottom">STORY EDITOR</div></div>
        <div style="display: flex; gap: 15px;">
            <button class="tool-btn" onclick="undo()"><i>↩️</i></button>
            <button class="tool-btn" onclick="shareImg()"><i>💾</i></button>
        </div>
    </div>

    <div class="editor-container">
        <div id="canvas-wrapper"><canvas id="storyCanvas"></canvas></div>
        
        <div id="floatingMenu" class="floating-menu">
            <button id="cropBtn" onclick="startCrop()">חתוך</button>
            <button id="confirmCropBtn" onclick="finishCrop()">אישור חיתוך</button>
            <button id="duplicateBtn" onclick="duplicateObj()">שכפל</button>
            <button id="deleteBtn" onclick="deleteObj()" style="color: #ff4444;">מחק</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="openTextEditor()"><i>T</i><span>טקסט</span></button>
        
        <div style="position: relative; flex: 1; display: flex; justify-content: center;">
            <button class="tool-btn" style="width: 100%;" onclick="toggleEmojiPicker()"><i>😍</i><span>אייקון</span></button>
            <div id="emojiPicker" class="emoji-picker">
                <button class="tool-btn" onclick="addIcon('❤️')">❤️</button><button class="tool-btn" onclick="addIcon('🔥')">🔥</button>
                <button class="tool-btn" onclick="addIcon('✨')">✨</button><button class="tool-btn" onclick="addIcon('✅')">✅</button>
                <button class="tool-btn" onclick="addIcon('🇮🇱')">🇮🇱</button><button class="tool-btn" onclick="addIcon('📢')">📢</button>
                <button class="tool-btn" onclick="addIcon('💪')">💪</button><button class="tool-btn" onclick="addIcon('🚨')">🚨</button>
            </div>
        </div>
        
        <label class="tool-btn"><i>🖼️</i><span>תמונה</span><input type="file" id="imageLoader" accept="image/*" style="display:none"></label>
        <button class="tool-btn" onclick="toggleBold()"><i>B</i><span>הדגשה</span></button>
        <button class="tool-btn" onclick="document.getElementById('colorInput').click()">
            <div class="color-preview" id="colorDisplay" style="background: white;"></div><span>צבע</span>
            <input type="color" id="colorInput" style="display:none">
        </button>
        <button class="tool-btn" onclick="changeBg()"><i>🎨</i><span>רקע</span></button>
        <button class="tool-btn" onclick="resetCanvas()"><i>🔄</i><span>איפוס</span></button>
    </div>

    <div id="textEditorOverlay">
        <textarea id="textEditorInput" placeholder="הקלידו כאן..."></textarea>
        <button class="btn-done" onclick="handleTextDone()">סיום</button>
    </div>

    <script>
        const fixHeight = () => {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
            resizeCanvas();
        };
        window.addEventListener('resize', fixHeight);

        const canvas = new fabric.Canvas('storyCanvas', {
            width: 1080, height: 1920, backgroundColor: '#242362', selection: false,
            preserveObjectStacking: true
        });

        const bgOptions = ['#242362', '#87CEEB', '#000000'];
        let bgIdx = 0, history = [];

        fabric.Object.prototype.set({
            transparentCorners: false, cornerColor: '#007bff', cornerStrokeColor: '#ffffff',
            cornerStyle: 'circle', cornerSize: 28, padding: 10
        });

        function loadLogo() {
            fabric.Image.fromURL('logo.png', function(img) {
                img.scaleToWidth(320); 
                img.set({ left: 540, top: 120, originX: 'center', originY: 'top', selectable: false, evented: false });
                canvas.setOverlayImage(img, canvas.renderAll.bind(canvas));
            });
        }

        function resizeCanvas() {
            const container = document.querySelector('.editor-container');
            const paddingH = 40;
            const paddingV = 160; 
            const availableW = container.clientWidth - paddingH;
            const availableH = container.clientHeight - paddingV;
            const ratio = 1080 / 1920;
            let newW, newH;
            if (availableW / availableH > ratio) {
                newH = availableH; newW = availableH * ratio;
            } else {
                newW = availableW; newH = availableW / ratio;
            }
            canvas.setZoom(newW / 1080);
            canvas.setWidth(newW); canvas.setHeight(newH);
            const wrapper = document.getElementById('canvas-wrapper');
            wrapper.style.width = newW + "px"; wrapper.style.height = newH + "px";
            canvas.requestRenderAll();
        }

        const overlay = document.getElementById('textEditorOverlay'), textInput = document.getElementById('textEditorInput');
        let currentEditingObj = null;
        let cropRect = null;
        let targetImg = null;

        function openTextEditor(obj = null) {
            currentEditingObj = obj; textInput.value = obj ? obj.text : "";
            overlay.style.display = 'flex'; setTimeout(() => textInput.focus(), 200);
        }

        function handleTextDone() {
            const val = textInput.value.trim();
            if (val) {
                if (currentEditingObj) {
                    currentEditingObj.set({ text: val });
                    currentEditingObj.initDimensions();
                    currentEditingObj.setCoords();
                } else {
                    const t = new fabric.Textbox(val, {
                        left: 540, top: 960, width: 920, fontFamily: 'FbMonopolyHeb', fontSize: 100, fill: 'white',
                        textAlign: 'center', originX: 'center', originY: 'center', fontWeight: 'bold', direction: 'rtl', editable: false
                    });
                    t.on('mousedblclick', () => openTextEditor(t));
                    canvas.add(t); canvas.setActiveObject(t);
                }
                saveState();
            } else if (currentEditingObj) { canvas.remove(currentEditingObj); }
            overlay.style.display = 'none'; canvas.requestRenderAll();
        }

        function toggleBold() {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'textbox') {
                const newWeight = obj.fontWeight === 'bold' ? 'normal' : 'bold';
                obj.set('fontWeight', newWeight);
                obj.initDimensions(); obj.setCoords(); canvas.requestRenderAll(); saveState();
            }
        }

        // פונקציות חיתוך חדשות
        function startCrop() {
            targetImg = canvas.getActiveObject();
            if (!targetImg || targetImg.type !== 'image') return;

            cropRect = new fabric.Rect({
                left: targetImg.left, top: targetImg.top,
                width: targetImg.getScaledWidth() / 1.5,
                height: targetImg.getScaledHeight() / 1.5,
                fill: 'rgba(255,255,255,0.3)', stroke: 'white', strokeDashArray: [5, 5],
                originX: 'center', originY: 'center', cornerSize: 20
            });

            canvas.add(cropRect);
            canvas.setActiveObject(cropRect);
            
            document.getElementById('cropBtn').style.display = 'none';
            document.getElementById('confirmCropBtn').style.display = 'inline-block';
            document.getElementById('duplicateBtn').style.display = 'none';
        }

        function finishCrop() {
            if (!targetImg || !cropRect) return;

            targetImg.set('clipPath', cropRect);
            canvas.remove(cropRect);
            canvas.setActiveObject(targetImg);
            
            document.getElementById('confirmCropBtn').style.display = 'none';
            document.getElementById('cropBtn').style.display = 'inline-block';
            document.getElementById('duplicateBtn').style.display = 'inline-block';
            
            canvas.renderAll();
            saveState();
            targetImg = null;
            cropRect = null;
        }

        function toggleEmojiPicker() {
            const p = document.getElementById('emojiPicker');
            p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
        }

        function addIcon(emoji) {
            const t = new fabric.IText(emoji, { 
                left: 540, top: 960, fontSize: 160, originX: 'center', originY: 'center', editable: false 
            });
            canvas.add(t); canvas.setActiveObject(t); toggleEmojiPicker(); saveState();
        }

        canvas.on('selection:created', updateFloatingMenu);
        canvas.on('selection:updated', updateFloatingMenu);
        canvas.on('selection:cleared', () => document.getElementById('floatingMenu').style.display = 'none');

        function updateFloatingMenu() {
            const obj = canvas.getActiveObject(); if(!obj) return;
            const menu = document.getElementById('floatingMenu');
            const rect = obj.getBoundingRect();
            menu.style.display = 'flex';
            menu.style.left = `${rect.left + (rect.width/2) - 60}px`;
            menu.style.top = `${rect.top - 80}px`;
            
            // הצגת כפתור חיתוך רק לתמונות
            const isImage = obj.type === 'image' && !cropRect;
            document.getElementById('cropBtn').style.display = isImage ? 'inline-block' : 'none';
            document.getElementById('duplicateBtn').style.display = cropRect ? 'none' : 'inline-block';
        }

        function duplicateObj() {
            const obj = canvas.getActiveObject();
            if (obj) obj.clone(cloned => {
                canvas.discardActiveObject();
                cloned.set({ left: obj.left + 50, top: obj.top + 50 });
                canvas.add(cloned); canvas.setActiveObject(cloned); saveState();
            }, ['fontWeight', 'fontFamily', 'width', 'textAlign', 'clipPath']);
        }

        function deleteObj() {
            const obj = canvas.getActiveObject();
            if (obj) { canvas.remove(obj); canvas.discardActiveObject(); saveState(); }
        }

        document.getElementById('colorInput').oninput = function() {
            const color = this.value; document.getElementById('colorDisplay').style.backgroundColor = color;
            const obj = canvas.getActiveObject();
            if (obj) { obj.set('fill', color); canvas.renderAll(); saveState(); }
        };

        document.getElementById('imageLoader').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = f => {
                fabric.Image.fromURL(f.target.result, img => {
                    img.scaleToWidth(700);
                    img.set({ left: 540, top: 1100, originX: 'center', originY: 'center' });
                    canvas.add(img); canvas.setActiveObject(img); saveState();
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function changeBg() {
            bgIdx = (bgIdx + 1) % bgOptions.length;
            canvas.setBackgroundColor(bgOptions[bgIdx], () => { canvas.renderAll(); saveState(); });
        }

        function resetCanvas() {
            if(confirm("למחוק הכל?")) { 
                canvas.getObjects().forEach(o => canvas.remove(o)); 
                canvas.setBackgroundColor('#242362', () => { canvas.renderAll(); saveState(); });
            }
        }

        function saveState() {
            history.push(JSON.stringify(canvas.toJSON(['fontWeight', 'fontFamily', 'width', 'textAlign', 'clipPath'])));
            if(history.length > 25) history.shift();
        }

        function undo() {
            if(history.length > 1) {
                history.pop();
                canvas.loadFromJSON(history[history.length-1], () => {
                    loadLogo(); canvas.renderAll();
                });
            }
        }

        async function shareImg() {
            canvas.setZoom(1); canvas.setWidth(1080); canvas.setHeight(1920);
            canvas.discardActiveObject().renderAll();
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1 });
            resizeCanvas();
            const blob = await (await fetch(dataURL)).blob();
            const file = new File([blob], 'story.png', { type: 'image/png' });
            if (navigator.share) navigator.share({ files: [file] }).catch(() => {});
            else { const a = document.createElement('a'); a.href = dataURL; a.download = 'story.png'; a.click(); }
        }

        document.fonts.ready.then(() => { fixHeight(); loadLogo(); saveState(); });
    </script>
</body>
</html>
