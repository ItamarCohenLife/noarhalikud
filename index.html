<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>עיצוב סטורי - צוות דוברות</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        @font-face {
            font-family: 'FtMonopol';
            src: url('FtMonopol-Bold.woff2') format('woff2');
            font-weight: bold;
        }
        @font-face {
            font-family: 'FtMonopol';
            src: url('FtMonopol-Regular.woff2') format('woff2');
            font-weight: normal;
        }

        :root { --vh: 1vh; }

        * { 
            box-sizing: border-box; 
            font-family: 'FtMonopol', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: white;
            margin: 0;
            display: flex;
            height: calc(var(--vh) * 100);
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        /* תפריט צד */
        .side-menu {
            width: 90px;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom) 8px;
            gap: 10px;
            border-left: 1px solid #333;
            z-index: 100;
        }

        .menu-item {
            background: #1e1e1e;
            border: 1px solid #444;
            color: white;
            width: 100%;
            height: 70px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-item:active { background: #333; transform: scale(0.95); }
        .menu-item b { font-size: 22px; }
        .menu-item span { font-size: 11px; margin-top: 4px; font-weight: bold; }

        .color-picker-btn {
            position: relative;
            width: 26px; height: 26px;
            border-radius: 50%;
            border: 2px solid white;
            background: linear-gradient(45deg, red, blue, green);
        }
        #colorInput { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }

        .main-editor {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050505;
            position: relative;
        }

        #canvas-wrapper { 
            box-shadow: 0 0 50px rgba(0,0,0,1); 
            border: 1px solid #222;
        }

        /* סרגל כלים עליון מעודכן */
        .top-tools {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 50; align-items: center;
        }

        .tool-group {
            display: flex; background: rgba(30,30,30,0.9); padding: 5px; border-radius: 50px; border: 1px solid #444; gap: 2px;
        }

        .tool-btn {
            padding: 8px 14px; border-radius: 50px; border: none; color: #fff; background: transparent; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .tool-btn:disabled { opacity: 0.3; cursor: default; }
        .tool-btn.active { background: #fff; color: #000; }
        .arrow-btn { font-size: 18px; padding: 5px 15px; }

        /* מגירת אייקונים */
        .icon-drawer {
            position: absolute; bottom: -350px; left: 0; width: 100%; height: 300px;
            background: #1a1a1a; border-top: 1px solid #333; transition: 0.4s ease;
            display: grid; grid-template-columns: repeat(4, 1fr); overflow-y: auto; padding: 20px; gap: 15px; z-index: 200;
        }
        .icon-drawer.open { bottom: 0; }
        .icon-item { font-size: 40px; text-align: center; cursor: pointer; padding: 10px; background: #222; border-radius: 12px; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="side-menu">
        <div class="menu-item" onclick="addNewText()"><b>T</b><span>טקסט</span></div>
        <div class="menu-item" onclick="toggleIcons()"><b>⭐</b><span>אייקון</span></div>
        <label class="menu-item"><b>🖼️</b><span>תמונה</span><input type="file" id="imageLoader" accept="image/*"></label>
        
        <div class="menu-item">
            <div class="color-picker-btn"><input type="color" id="colorInput" value="#ffffff"></div>
            <span>צבע</span>
        </div>

        <div class="menu-item" onclick="changeBg()"><b>🎨</b><span>רקע</span></div>
        <div class="menu-item" onclick="deleteObj()" style="border-color: #551a1a;"><b>🗑️</b><span>מחק</span></div>
        <div class="menu-item" onclick="resetCanvas()" style="border-color: #ff9800;"><b>🔄</b><span>איפוס</span></div>
        
        <div class="menu-item" onclick="shareImg()" style="background: #25d366; border:none; margin-top: auto; height: 80px;"><b>💾</b><span>שמור</span></div>
    </div>

    <div class="main-editor">
        <div class="top-tools">
            <div class="tool-group">
                <button class="tool-btn arrow-btn" onclick="undo()" id="undoBtn">↪️</button>
                <button class="tool-btn arrow-btn" onclick="redo()" id="redoBtn">↩️</button>
            </div>
            <div class="tool-group">
                <button id="boldBtn" class="tool-btn active" onclick="updateSelectedWeight('bold')">מודגש</button>
                <button id="regBtn" class="tool-btn" onclick="updateSelectedWeight('normal')">רגיל</button>
            </div>
        </div>
        <div id="canvas-wrapper"><canvas id="storyCanvas"></canvas></div>
    </div>

    <div id="iconDrawer" class="icon-drawer">
        <div class="icon-item" onclick="addIcon('heart')">❤️</div>
        <div class="icon-item" onclick="addIcon('star')">⭐</div>
        <div class="icon-item" onclick="addIcon('fire')">🔥</div>
        <div class="icon-item" onclick="addIcon('check')">✅</div>
        <div class="icon-item" onclick="addIcon('crown')">👑</div>
        <div class="icon-item" onclick="addIcon('zap')">⚡</div>
    </div>

    <script>
        const canvas = new fabric.Canvas('storyCanvas', { 
            width: 1080, height: 1920, 
            backgroundColor: '#001f3f'
        });

        // מערכת Undo/Redo
        let stateStack = [];
        let redoStack = [];
        let isMoving = false;

        function saveState() {
            if (isMoving) return;
            const json = JSON.stringify(canvas.toJSON(['lineHeight', 'direction', 'fontWeight', 'selectable', 'evented']));
            stateStack.push(json);
            redoStack = []; // ניקוי ה-redo כשיש פעולה חדשה
            updateUndoButtons();
        }

        function undo() {
            if (stateStack.length <= 1) return;
            redoStack.push(stateStack.pop());
            const lastState = stateStack[stateStack.length - 1];
            isMoving = true;
            canvas.loadFromJSON(lastState, () => {
                canvas.renderAll();
                isMoving = false;
                updateUndoButtons();
            });
        }

        function redo() {
            if (redoStack.length === 0) return;
            const nextState = redoStack.pop();
            stateStack.push(nextState);
            isMoving = true;
            canvas.loadFromJSON(nextState, () => {
                canvas.renderAll();
                isMoving = false;
                updateUndoButtons();
            });
        }

        function updateUndoButtons() {
            document.getElementById('undoBtn').disabled = stateStack.length <= 1;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        // האזנה לשינויים לשמירה אוטומטית
        canvas.on('object:modified', saveState);
        canvas.on('object:added', saveState);
        canvas.on('object:removed', saveState);

        // הגדרות אובייקטים
        fabric.Object.prototype.set({
            transparentCorners: false,
            cornerColor: '#ffffff',
            cornerStrokeColor: '#007bff',
            cornerStyle: 'circle',
            cornerSize: 40,
            padding: 10,
            uniformScaling: true
        });
        fabric.Object.prototype.setControlsVisibility({ mt: false, mb: false, ml: false, mr: false });

        const backgroundOptions = ['#001f3f', '#87CEEB', '#0a0a0a', '#5DADE2', '#1a2a6c', '#b21f1f'];
        let bgIdx = 0;

        function changeBg() {
            bgIdx = (bgIdx + 1) % backgroundOptions.length;
            canvas.setBackgroundColor(backgroundOptions[bgIdx], () => {
                canvas.renderAll();
                saveState();
            });
        }

        function fitCanvas() {
            const wrapper = document.querySelector('.main-editor');
            const scale = Math.min((wrapper.clientWidth-20)/1080, (wrapper.clientHeight-100)/1920);
            canvas.setZoom(scale); canvas.setWidth(1080 * scale); canvas.setHeight(1920 * scale);
        }

        function loadLogo() {
            fabric.Image.fromURL('logo.png', function(img) {
                img.set({ left: 540, top: 200, originX: 'center', selectable: false, evented: false });
                img.scaleToWidth(380); 
                canvas.add(img);
                saveState(); // מצב התחלתי
            }, { crossOrigin: 'anonymous' });
        }

        function addNewText() {
            const text = new fabric.IText('לחץ פעמיים\nלעריכה', {
                left: 540, top: 960,
                fontFamily: 'FtMonopol', fontSize: 100, fill: 'white',
                textAlign: 'center', originX: 'center', originY: 'center',
                direction: 'rtl', fontWeight: 'bold', lineHeight: 0.8, editable: true
            });
            canvas.add(text);
            canvas.setActiveObject(text);
            text.enterEditing();
            text.selectAll();
        }

        function updateSelectedWeight(w) {
            const active = canvas.getActiveObject();
            document.getElementById('boldBtn').classList.toggle('active', w === 'bold');
            document.getElementById('regBtn').classList.toggle('active', w === 'normal');
            if (active && active.type === 'i-text') {
                active.set('fontWeight', w);
                canvas.renderAll();
                saveState();
            }
        }

        document.getElementById('colorInput').oninput = function() {
            const active = canvas.getActiveObject();
            if (active && active.type === 'i-text') {
                active.set('fill', this.value);
                canvas.renderAll();
            }
        };
        document.getElementById('colorInput').onchange = saveState;

        canvas.on('object:moving', function(e) {
            const obj = e.target;
            const bounds = obj.getBoundingRect();
            if (bounds.left < 0) obj.left -= bounds.left;
            if (bounds.top < 0) obj.top -= bounds.top;
            if (bounds.left + bounds.width > 1080) obj.left -= (bounds.left + bounds.width - 1080);
            if (bounds.top + bounds.height > 1920) obj.top -= (bounds.top + bounds.height - 1920);
        });

        function resetCanvas() {
            if(confirm("לאפס את העיצוב?")) {
                canvas.getObjects().forEach(obj => { if(obj.selectable) canvas.remove(obj); });
                bgIdx = 0;
                canvas.setBackgroundColor(backgroundOptions[0], canvas.renderAll.bind(canvas));
                saveState();
            }
        }

        function addIcon(name) {
            const svgs = {
                heart: 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z',
                star: 'M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z',
                fire: 'M13.5,0.67c0,0-2.34,5.15-5.32,6.31C6,7.7,4.3,10.7,4.3,12.61c0,3.34,2.72,6.06,6.06,6.06c3.34,0,6.06-2.72,6.06-6.06 c0-3.13-2.54-5.67-5.67-5.67',
                check: 'M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z',
                crown: 'M5 16h14a2 2 0 0 0 2-2V5l-5 4-4-4-4 4-5-4v9a2 2 0 0 0 2 2z',
                zap: 'M7 2v11h3v9l7-12h-4l4-8z'
            };
            const path = new fabric.Path(svgs[name]);
            path.set({ left: 540, top: 1000, scaleX: 6, scaleY: 6, fill: '#fff', originX: 'center', originY: 'center' });
            canvas.add(path); canvas.setActiveObject(path); toggleIcons();
        }

        function toggleIcons() { document.getElementById('iconDrawer').classList.toggle('open'); }

        document.getElementById('imageLoader').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    img.scaleToWidth(800); img.set({ left: 540, top: 1100, originX: 'center', originY: 'center' });
                    canvas.add(img); canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function deleteObj() { 
            const a = canvas.getActiveObject(); 
            if(a && a.selectable !== false) canvas.remove(a); 
        }

        async function shareImg() {
            canvas.discardActiveObject().renderAll();
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 0.95, multiplier: 1/canvas.getZoom() });
            const blob = await (await fetch(dataURL)).blob();
            const file = new File([blob], 'story.jpg', { type: 'image/jpeg' });
            if (navigator.share) await navigator.share({ files: [file] });
            else { const l = document.createElement('a'); l.download = 'story.jpg'; l.href = dataURL; l.click(); }
        }

        window.addEventListener('resize', fitCanvas);
        document.fonts.ready.then(() => { fitCanvas(); loadLogo(); });
    </script>
</body>
</html>
